<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>P2P File Transfer Criptato - PeerJS</title>
  <script src="https://unpkg.com/peerjs@1.5.3/dist/peerjs.min.js"></script>
  <style>
    body { font-family: Arial; margin: 20px; }
    input, button { margin: 5px 0; }
    #log { background: #eee; padding: 10px; height: 150px; overflow-y: scroll; }
  </style>
</head>
<body>

<h2>🔐 P2P File Transfer Criptato</h2>

<b>Il tuo Peer ID:</b>
<div id="my-id">...</div>

<hr>

<h3>Connessione</h3>
<input type="text" id="peer-id" placeholder="Peer ID remoto">
<button onclick="connectPeer()">Connetti</button>

<hr>

<h3>Invio file</h3>
<input type="file" id="fileInput">
<button onclick="sendFile()">Invia file</button>

<hr>

<h3>Chiave</h3>
<button onclick="generateKey()">Genera chiave</button>
<input type="text" id="sharedKey" style="width:100%" placeholder="Chiave condivisa">

<hr>

<div id="log"></div>

<script>

function log(msg) {
  document.getElementById('log').innerHTML += msg + "<br>";
}

// =============================
// PeerJS
// =============================
const peer = new Peer();
let conn;

peer.on('open', id => {
  document.getElementById('my-id').innerText = id;
  log("✅ Peer aperto: " + id);
});

peer.on('connection', c => {
  conn = c;
  setupConnection();
});

function connectPeer() {
  const id = document.getElementById('peer-id').value.trim();
  conn = peer.connect(id);
  setupConnection();
}

function setupConnection() {
  conn.on('open', () => {
    log("🔗 Connesso!");
  });

  conn.on('data', async data => {
    log("📥 Ricevuto file...");
    await receiveEncrypted(data);
  });
}

// =============================
// Crypto
// =============================

function generateKey() {
  const key = crypto.getRandomValues(new Uint8Array(32));
  const base64 = btoa(String.fromCharCode(...key));
  document.getElementById('sharedKey').value = base64;
  log("🔑 Chiave generata");
}

function getKeyBytes() {
  const base64 = document.getElementById('sharedKey').value;
  const binary = atob(base64);
  return Uint8Array.from(binary, c => c.charCodeAt(0));
}

async function encrypt(data) {
  const keyBytes = getKeyBytes();
  const cryptoKey = await crypto.subtle.importKey(
    "raw", keyBytes, "AES-GCM", false, ["encrypt"]
  );

  const iv = crypto.getRandomValues(new Uint8Array(12));

  const cipher = await crypto.subtle.encrypt(
    { name: "AES-GCM", iv },
    cryptoKey,
    data
  );

  return { cipher, iv };
}

async function decrypt(cipher, iv) {
  const keyBytes = getKeyBytes();

  const cryptoKey = await crypto.subtle.importKey(
    "raw", keyBytes, "AES-GCM", false, ["decrypt"]
  );

  return await crypto.subtle.decrypt(
    { name: "AES-GCM", iv },
    cryptoKey,
    cipher
  );
}

// =============================
// FILE SEND
// =============================

async function sendFile() {
  if (!conn || !conn.open) {
    log("❌ Non connesso");
    return;
  }

  const file = document.getElementById('fileInput').files[0];
  if (!file) return;

  const arrayBuffer = await file.arrayBuffer();

  log("🔐 Cifratura...");
  const { cipher, iv } = await encrypt(arrayBuffer);

  conn.send({
    name: file.name,
    type: file.type,
    cipher,
    iv
  });

  log("📤 File inviato");
}

// =============================
// FILE RECEIVE
// =============================

async function receiveEncrypted(data) {
  log("🔓 Decifratura...");

  try {
    const plain = await decrypt(data.cipher, data.iv);

    const blob = new Blob([plain], { type: data.type });

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = data.name;

    a.click();

    log("✅ File scaricato: " + data.name);
  } catch (e) {
    log("❌ Errore decifratura (chiave errata?)");
  }
}

</script>

</body>
</html>
